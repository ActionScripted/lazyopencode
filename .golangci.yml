version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - misspell
    - nolintlint
    - revive
    - staticcheck
    - unused
  settings:
    revive:
      rules:
        # Disable pedantic doc-comment requirement on exported symbols
        - name: exported
          disabled: true
    errcheck: {}
    nolintlint:
      # Every //nolint directive must name the specific linter being suppressed
      require-specific: true
      # Every //nolint directive must include a justification comment after the linter name
      require-explanation: true
  exclusions:
    rules:
      # errcheck is noisy in test files
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/actionscripted/lazyopencode
